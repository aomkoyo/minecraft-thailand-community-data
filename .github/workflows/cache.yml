name: Fetch and Cache Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create public directory
        run: mkdir -p public

      - name: Fetch data with ETag caching and Timestamp
        env:
          DATA_URL: "https://script.google.com/macros/s/AKfycbxOl1xXzIVBLriJOOI_rdVlWpvA-3i8eC8V0yvoj9UxnGYNQi6wwMwfGeHBBnP0zZk/exec" 
        run: |
          # ตั้งค่า Timezone เป็นกรุงเทพฯ (UTC+7) และสร้างตัวแปรชื่อไฟล์ mm-dd-hh
          TIMESTAMP=$(TZ='Asia/Bangkok' date +'%m-%d-%H')
          NEW_FILENAME="base-${TIMESTAMP}.json"
          
          # Fetch ข้อมูลมาเก็บไว้ที่ไฟล์ temp.json ชั่วคราวก่อน
          curl -L -s \
            --etag-compare public/.etag \
            --etag-save public/.etag \
            -o temp.json \
            "$DATA_URL"
            
          # ตรวจสอบว่าไฟล์ temp.json มีขนาดมากกว่า 0 byte หรือไม่ (ถ้า ETag ตรงกัน ไฟล์จะว่างเปล่าเพราะไม่ได้โหลดใหม่)
          if [ -s temp.json ]; then
            echo "New data fetched. Updating file..."
            # ลบไฟล์นามสกุลเก่าและไฟล์ data.json เดิมออก
            rm -f public/base-*.json public/data.json
            # ย้ายไฟล์ใหม่เข้าไปแทนที่ด้วยชื่อตามชั่วโมง
            mv temp.json "public/$NEW_FILENAME"
          else
            echo "Data not modified (ETag match). Renaming old file to current hour..."
            # กรณีข้อมูลไม่เปลี่ยน ให้ลบ temp.json ทิ้ง แล้วแค่เปลี่ยนชื่อไฟล์เก่าให้เป็นชั่วโมงล่าสุด
            rm -f temp.json
            OLD_FILE=$(ls public/base-*.json 2>/dev/null | head -n 1)
            
            # เปลี่ยนชื่อไฟล์เก่า(ถ้ามี) ให้เป็นชื่อชั่วโมงล่าสุด
            if [ -n "$OLD_FILE" ] && [ "$OLD_FILE" != "public/$NEW_FILENAME" ]; then
              mv "$OLD_FILE" "public/$NEW_FILENAME"
            fi
          fi

          # สร้าง environment variable เก็บชื่อไฟล์ไว้ใช้ใน Step ถัดไป
          echo "SAVED_FILENAME=$NEW_FILENAME" >> $GITHUB_ENV

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage ข้อมูลทั้งหมดในโฟลเดอร์ public (รวมถึงการลบไฟล์เก่าและการเพิ่มไฟล์ใหม่)
          git add public/
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงหรือไม่
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data to ${{ env.SAVED_FILENAME }}"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in files. Nothing to commit."
          fi
