name: Fetch and Cache Data

on:
  schedule:
    # รันทุกๆ 30 นาที (นาทีที่ 0 และ 30 ของทุกชั่วโมง)
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create public directory
        run: mkdir -p public

      - name: Fetch and compare data
        env:
          DATA_URL: "https://script.google.com/macros/s/AKfycbxOl1xXzIVBLriJOOI_rdVlWpvA-3i8eC8V0yvoj9UxnGYNQi6wwMwfGeHBBnP0zZk/exec" 
        run: |
          # ตั้งค่า Timezone เป็น UTC+7 (Asia/Bangkok) และเพิ่มนาที (%M) ในชื่อไฟล์
          TIMESTAMP=$(TZ='Asia/Bangkok' date +'%m-%d-%H-%M')
          NEW_FILENAME="base-${TIMESTAMP}.json"
          
          # โหลดข้อมูลใหม่มาไว้ที่ temp.json
          curl -L -s -o temp.json "$DATA_URL"
          
          # ตรวจสอบว่าดาวน์โหลดสำเร็จและไฟล์ไม่ว่างเปล่า
          if [ ! -s temp.json ]; then
            echo "Failed to fetch data or data is empty. Exiting."
            exit 1
          fi

          # ดึงไฟล์เก่าล่าสุดมาเปรียบเทียบ (ถ้ามี)
          OLD_FILE=$(ls public/base-*.json 2>/dev/null | head -n 1)

          # ใช้คำสั่ง cmp เพื่อเทียบเนื้อหาไฟล์ ถ้าข้อมูลเหมือนเดิมเป๊ะ จะไม่ทำอะไร
          if [ -n "$OLD_FILE" ] && cmp -s temp.json "$OLD_FILE"; then
            echo "Data has not changed. No updates needed."
            rm temp.json
            echo "SAVED_FILENAME=$(basename "$OLD_FILE")" >> $GITHUB_ENV
          else
            echo "New data detected! Updating files..."
            
            # ล้างไฟล์ base-*.json เก่าออกทั้งหมด
            rm -f public/base-*.json
            
            # ย้าย temp.json ไปเป็นไฟล์ timestamp ใหม่
            mv temp.json "public/$NEW_FILENAME"
            
            # สร้าง copy ที่ชื่อ data.json เสมอ เพื่อให้แอปของคุณเรียกใช้งานได้ง่าย (ไม่ต้องเดาชื่อไฟล์)
            cp "public/$NEW_FILENAME" public/data.json
            
            echo "SAVED_FILENAME=$NEW_FILENAME" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage ข้อมูลทั้งหมดในโฟลเดอร์ public
          git add public/
          
          # ตรวจสอบว่ามีไฟล์ใหม่หรือไฟล์ถูกลบ/แก้ไขหรือไม่
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data to ${{ env.SAVED_FILENAME }}"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in files. Nothing to commit."
          fi
